<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EWM Management Portal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #050D1A;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .loader {
    text-align: center;
    color: white;
  }

  .brand-mark {
    width: 64px; height: 64px;
    border-radius: 14px;
    background: linear-gradient(135deg, #0EA5E9, #0369A1);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: #fff;
    margin: 0 auto 20px;
    box-shadow: 0 8px 32px rgba(14,165,233,0.4);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 8px 32px rgba(14,165,233,0.4); }
    50%       { box-shadow: 0 8px 48px rgba(14,165,233,0.8); }
  }

  .loader h2 {
    font-size: 20px; font-weight: 800;
    color: #fff; margin-bottom: 6px;
  }

  .loader p {
    font-size: 13px; color: rgba(255,255,255,0.4);
    margin-bottom: 28px;
  }

  .spin {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #0EA5E9;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* الـ iframe مخفي تماماً */
  #portalFrame {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 10;
  }

  #portalFrame.loaded {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="loader" id="loaderScreen">
  <div class="brand-mark">EWM</div>
  <h2>EWM Management Portal</h2>
  <p>Loading your portal, please wait…</p>
  <div class="spin"></div>
</div>

<iframe
  id="portalFrame"
  src="https://script.google.com/macros/s/AKfycbyTLCdyPf0mQpKolCy1MvZB5fh9NvzCzGbL_zrFOh0gLFlCz1b0lrz4h0NCAfLmgnsI/exec"
  allow="clipboard-read; clipboard-write"
  sandbox="allow-scripts allow-forms allow-same-origin allow-popups"
></iframe>

<script>
  var frame = document.getElementById('portalFrame');
  var loader = document.getElementById('loaderScreen');

  frame.addEventListener('load', function() {
    loader.style.display = 'none';
    frame.classList.add('loaded');
  });

  // Fallback لو الـ iframe اتأخر أكتر من 10 ثواني
  setTimeout(function() {
    loader.style.display = 'none';
    frame.classList.add('loaded');
  }, 10000);
</script>

</body>
</html>
